{% extends "encyclopedia/layout.html" %}

{% block title %}
    {{ title }} - Edit
{% endblock %}

{% block body %}
    <h1>{{ title }}</h1>
    <form action="{% url 'edit' title=title %}" method="post">
        {% csrf_token %}
        {{ form }}
        <input type="submit" value="Save">
    </form>
{% endblock %}
